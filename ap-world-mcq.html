<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History MCQ Practice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .app {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0 20px;
        }

        header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        /* Period Filter */
        .period-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .period-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.2s;
        }

        .period-btn:hover { border-color: #60a5fa; color: #e2e8f0; }
        .period-btn.active { background: #1e40af; border-color: #3b82f6; color: #fff; }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .stat { text-align: center; }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: #60a5fa; }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Question Card */
        .question-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 28px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .question-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-period { background: #1e3a5f; color: #60a5fa; }
        .badge-topic { background: #3b1f5e; color: #a78bfa; }
        .badge-num { background: #1a3328; color: #4ade80; }

        .stimulus {
            background: #0f172a;
            border-left: 3px solid #60a5fa;
            padding: 16px;
            margin-bottom: 18px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .stimulus-source {
            font-style: normal;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 8px;
        }

        .question-text {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #f1f5f9;
        }

        .options { display: flex; flex-direction: column; gap: 10px; }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.5;
        }

        .option:hover:not(.disabled) {
            border-color: #60a5fa;
            background: #172554;
        }

        .option-letter {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            background: #334155;
            color: #e2e8f0;
        }

        .option.correct { border-color: #22c55e; background: #052e16; }
        .option.correct .option-letter { background: #22c55e; color: #052e16; }
        .option.incorrect { border-color: #ef4444; background: #2a0a0a; }
        .option.incorrect .option-letter { background: #ef4444; color: #fff; }
        .option.show-correct { border-color: #22c55e44; background: #052e1644; }
        .option.disabled { cursor: default; }

        /* Explanation */
        .explanation {
            margin-top: 18px;
            padding: 18px;
            background: #0f172a;
            border-radius: 10px;
            border: 1px solid #334155;
            display: none;
        }

        .explanation.show { display: block; }

        .explanation h4 {
            color: #60a5fa;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .explanation p {
            color: #94a3b8;
            line-height: 1.6;
            font-size: 0.92rem;
        }

        /* Next button */
        .next-btn {
            display: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .next-btn:hover { opacity: 0.9; }
        .next-btn.show { display: block; }

        /* Quit button */
        .quit-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: transparent;
            color: #94a3b8;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quit-btn:hover { border-color: #ef4444; color: #ef4444; }

        /* Home screen */
        .home-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .home-screen h2 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: #f1f5f9;
        }

        .home-screen p {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .start-btn {
            padding: 14px 40px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
        }

        .start-btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* Results screen */
        .results-screen {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }

        .results-screen h2 { font-size: 1.6rem; margin-bottom: 8px; }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #3b82f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 24px auto;
        }

        .score-circle .pct { font-size: 2.2rem; font-weight: 800; color: #60a5fa; }
        .score-circle .label { font-size: 0.8rem; color: #64748b; }

        .results-detail {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0 30px;
        }

        .results-detail .stat-value { font-size: 1.2rem; }

        .restart-btn {
            padding: 14px 40px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .restart-btn:hover { opacity: 0.9; }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .app { padding: 12px; }
            header h1 { font-size: 1.4rem; }
            .question-card { padding: 18px; }
            .stats-bar { flex-wrap: wrap; gap: 10px; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>AP World History MCQ Practice</h1>
            <p>8000 BCE &mdash; Present | All 9 Units</p>
        </header>

        <!-- Home Screen -->
        <div id="home" class="home-screen">
            <h2>Select Time Periods</h2>
            <p>Choose which periods to study, then start the quiz.</p>
            <div class="period-filter" id="periodFilter"></div>
            <br>
            <button class="start-btn" onclick="startQuiz()">Start Practice</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" style="display:none;">
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value" id="scoreVal">0</div>
                    <div class="stat-label">Correct</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalVal">0/0</div>
                    <div class="stat-label">Progress</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streakVal">0</div>
                    <div class="stat-label">Streak</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="pctVal">0%</div>
                    <div class="stat-label">Accuracy</div>
                </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <div></div>
                <button class="quit-btn" onclick="quitQuiz()">Quit</button>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="question-card" id="questionCard"></div>
            <div class="explanation" id="explanation"></div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question</button>
        </div>

        <!-- Results Screen -->
        <div id="results" class="results-screen"></div>
    </div>

<script>
// ── Question Bank ──
const questions = [
    // ═══ UNIT 1: The Global Tapestry (c. 1200–1450) ═══
    {
        period: "Unit 1",
        periodName: "The Global Tapestry (1200–1450)",
        topic: "Song Dynasty China",
        stimulus: `"The people of the Song dynasty produced more iron in a single year than the whole of Europe would produce for centuries. Great furnaces dotted the landscape of northern China, and the smoke of industry hung thick over the cities."`,
        stimulusSource: "— Economic historian, modern analysis",
        question: "Which of the following best explains the significance of Song dynasty industrial production described in the passage?",
        options: [
            "It demonstrated that China had surpassed all other civilizations permanently",
            "It reflected an era of technological innovation and proto-industrialization in East Asia",
            "It proved that European economies were entirely stagnant during this period",
            "It was primarily driven by demand for weapons during the Mongol invasions"
        ],
        correct: 1,
        explanation: "The Song dynasty (960–1279) experienced remarkable economic and technological growth, including advances in iron production, printing, gunpowder, and the compass. This proto-industrialization reflected broader patterns of innovation in East Asia, though it does not mean other civilizations were stagnant."
    },
    {
        period: "Unit 1",
        periodName: "The Global Tapestry (1200–1450)",
        topic: "Dar al-Islam",
        stimulus: `"From Cordoba to Baghdad, from Cairo to Samarkand, scholars translated Greek texts, advanced algebra, and perfected techniques of irrigation that transformed arid lands into gardens."`,
        stimulusSource: "— Historical survey of Islamic civilization",
        question: "The developments described in the passage best illustrate which historical process?",
        options: [
            "The spread of Islam through forced conversion of conquered peoples",
            "The role of Islamic scholars in preserving and expanding classical knowledge",
            "The decline of the Byzantine Empire due to Islamic military conquests",
            "The isolation of Islamic civilization from other Eurasian cultures"
        ],
        correct: 1,
        explanation: "Islamic scholars played a crucial role in translating, preserving, and building upon Greek, Persian, and Indian knowledge during the Islamic Golden Age. This intellectual tradition connected diverse regions of Dar al-Islam and would later influence the European Renaissance."
    },
    {
        period: "Unit 1",
        periodName: "The Global Tapestry (1200–1450)",
        topic: "Mongol Empire",
        question: "The Pax Mongolica (c. 1250–1350) most directly facilitated which of the following?",
        options: [
            "The collapse of long-distance trade across Eurasia",
            "Increased exchange of goods, ideas, and diseases along trans-Eurasian routes",
            "The permanent unification of China and the Middle East under one government",
            "The isolation of Europe from Asian trade networks"
        ],
        correct: 1,
        explanation: "The Pax Mongolica, or 'Mongol Peace,' created relatively stable conditions across the vast Mongol Empire, enabling increased trade, cultural exchange, and unfortunately, the spread of diseases like the Black Death along the Silk Roads."
    },
    {
        period: "Unit 1",
        periodName: "The Global Tapestry (1200–1450)",
        topic: "South and Southeast Asia",
        stimulus: `"The temples of Angkor stretched across an area larger than modern-day Paris, supported by a vast system of reservoirs and canals that fed the rice paddies sustaining a population of nearly one million."`,
        stimulusSource: "— Archaeological study of the Khmer Empire",
        question: "The infrastructure described in the passage best demonstrates which characteristic of the Khmer Empire?",
        options: [
            "Its reliance on maritime trade as the sole source of wealth",
            "Its use of sophisticated hydraulic engineering to support a large agrarian state",
            "Its adoption of Islamic architectural principles from Arab traders",
            "Its political system modeled directly on Chinese Confucian bureaucracy"
        ],
        correct: 1,
        explanation: "The Khmer Empire centered at Angkor developed an extraordinary hydraulic system (barays and canals) that enabled intensive rice agriculture, supporting a massive population. This engineering feat was central to Khmer state power and reflected Hindu-Buddhist cultural influences, not Islamic or Chinese models."
    },
    {
        period: "Unit 1",
        periodName: "The Global Tapestry (1200–1450)",
        topic: "Africa",
        stimulus: `"Mansa Musa's pilgrimage to Mecca in 1324 was so lavish that his distribution of gold in Cairo caused the price of gold to plummet for a decade."`,
        stimulusSource: "— Al-Umari, contemporary Arab historian",
        question: "Mansa Musa's pilgrimage best illustrates which of the following about the Mali Empire?",
        options: [
            "Mali was primarily a maritime trading power in the Indian Ocean",
            "The trans-Saharan gold trade made Mali one of the wealthiest states in the world",
            "Islam had completely replaced all indigenous African religious practices in Mali",
            "Mali's wealth was based primarily on the Atlantic slave trade"
        ],
        correct: 1,
        explanation: "The Mali Empire controlled the trans-Saharan gold and salt trade, making it extraordinarily wealthy. Mansa Musa's famous hajj demonstrated both Mali's immense wealth and its integration into the broader Islamic world, though traditional African practices continued alongside Islam."
    },
    {
        period: "Unit 1",
        periodName: "The Global Tapestry (1200–1450)",
        topic: "Europe",
        question: "The European feudal system of the medieval period was primarily characterized by which of the following?",
        options: [
            "A centralized bureaucracy based on merit-based examinations",
            "Decentralized political authority based on reciprocal obligations between lords and vassals",
            "A democratic system of governance with elected representatives",
            "A theocratic government directly controlled by the Pope"
        ],
        correct: 1,
        explanation: "European feudalism was a decentralized system in which lords granted land (fiefs) to vassals in exchange for military service and loyalty. This created a hierarchy of obligations that structured medieval European political and social life, in contrast to more centralized systems like China's."
    },

    // ═══ UNIT 2: Networks of Exchange (c. 1200–1450) ═══
    {
        period: "Unit 2",
        periodName: "Networks of Exchange (1200–1450)",
        topic: "Silk Roads",
        stimulus: `"Along the roads from China to the Mediterranean, not only silk but also paper, gunpowder, spices, and religions traveled—transforming every society they touched."`,
        stimulusSource: "— Modern historical analysis",
        question: "The passage best supports which of the following claims about the Silk Roads?",
        options: [
            "Trade along the Silk Roads was limited to luxury goods for elites",
            "The Silk Roads facilitated the exchange of technologies, beliefs, and commodities across Eurasia",
            "The Silk Roads primarily benefited European economies at the expense of Asian ones",
            "Overland trade routes were less significant than maritime routes during this period"
        ],
        correct: 1,
        explanation: "The Silk Roads were conduits for far more than silk—technologies (paper, gunpowder, compass), religions (Buddhism, Islam, Christianity), crops, and diseases all spread along these routes, transforming societies across Eurasia."
    },
    {
        period: "Unit 2",
        periodName: "Networks of Exchange (1200–1450)",
        topic: "Indian Ocean Trade",
        question: "Which of the following was a key factor enabling the growth of Indian Ocean trade networks between 1200 and 1450?",
        options: [
            "The construction of the Suez Canal connecting the Mediterranean to the Red Sea",
            "Knowledge of monsoon wind patterns and advances in maritime technology such as the dhow and compass",
            "The establishment of European colonial outposts along the East African coast",
            "The Mongol conquest of all territories bordering the Indian Ocean"
        ],
        correct: 1,
        explanation: "Indian Ocean trade flourished due to sailors' understanding of predictable monsoon winds, which allowed seasonal round-trip voyages, combined with advances in ship design (like the dhow) and navigational tools (the astrolabe and compass)."
    },
    {
        period: "Unit 2",
        periodName: "Networks of Exchange (1200–1450)",
        topic: "Trans-Saharan Trade",
        stimulus: `"Camels, introduced from Arabia, transformed the Sahara from an impassable barrier into a highway of commerce. Gold flowed north; salt flowed south; and Islam followed the trade."`,
        stimulusSource: "— Survey of African history",
        question: "According to the passage, which best describes the role of the trans-Saharan trade routes?",
        options: [
            "They connected sub-Saharan Africa exclusively to European markets",
            "They facilitated economic exchange and cultural diffusion between West Africa and North Africa",
            "They were controlled entirely by Arab merchants who excluded African traders",
            "They declined rapidly after the introduction of the camel"
        ],
        correct: 1,
        explanation: "Trans-Saharan trade connected the gold-producing regions of West Africa with the salt deposits and Mediterranean markets of North Africa. The trade also served as a conduit for the spread of Islam into sub-Saharan Africa, profoundly shaping West African states like Ghana, Mali, and Songhai."
    },
    {
        period: "Unit 2",
        periodName: "Networks of Exchange (1200–1450)",
        topic: "Effects of Exchange",
        question: "The spread of the Black Death (bubonic plague) across Eurasia in the 14th century is best understood as a consequence of which development?",
        options: [
            "European colonial expansion into the Americas",
            "Increased connectivity through trade networks, particularly under the Mongol Empire",
            "The collapse of the Roman Empire and resulting political instability",
            "Deliberate biological warfare between the Ottoman and Byzantine empires"
        ],
        correct: 1,
        explanation: "The Black Death spread along trade routes, particularly the Silk Roads, facilitated by the Pax Mongolica's increased connectivity. The plague likely originated in Central Asia and was carried by fleas on rats traveling with merchants and Mongol armies, devastating populations from China to Europe."
    },
    {
        period: "Unit 2",
        periodName: "Networks of Exchange (1200–1450)",
        topic: "Swahili City-States",
        question: "The Swahili city-states of East Africa (such as Kilwa, Mombasa, and Zanzibar) are best characterized as:",
        options: [
            "Isolated agricultural communities with no external trade connections",
            "Cosmopolitan trading centers blending African, Arab, and Persian cultural elements",
            "Military empires that conquered large territorial holdings in the African interior",
            "European colonial settlements established during the Crusades"
        ],
        correct: 1,
        explanation: "Swahili city-states were vibrant centers of Indian Ocean trade, exporting gold, ivory, and enslaved people while importing textiles and porcelain. Their culture uniquely blended Bantu African traditions with Arab and Persian influences, as reflected in the Swahili language (Bantu grammar with Arabic loanwords)."
    },

    // ═══ UNIT 3: Land-Based Empires (c. 1450–1750) ═══
    {
        period: "Unit 3",
        periodName: "Land-Based Empires (1450–1750)",
        topic: "Ottoman Empire",
        stimulus: `"The devshirme system recruited Christian boys from the Balkans, converted them to Islam, and trained them for elite military or administrative service. The most capable could rise to the rank of grand vizier."`,
        stimulusSource: "— Ottoman administrative records",
        question: "The devshirme system described in the passage served which primary purpose for the Ottoman Empire?",
        options: [
            "To spread Christianity throughout the Ottoman territories",
            "To create a loyal, skilled class of soldiers and administrators beholden to the sultan",
            "To reduce the population of Christian minorities through forced emigration",
            "To establish a democratic system of governance in conquered territories"
        ],
        correct: 1,
        explanation: "The devshirme system created the Janissary corps and trained administrators who owed their status entirely to the sultan, not to aristocratic families. This gave Ottoman sultans a powerful, loyal military and bureaucratic force that helped counterbalance the influence of traditional nobility."
    },
    {
        period: "Unit 3",
        periodName: "Land-Based Empires (1450–1750)",
        topic: "Mughal Empire",
        question: "Emperor Akbar of the Mughal Empire is most noted for which policy approach?",
        options: [
            "Enforcing strict Islamic law and persecuting Hindu subjects",
            "Promoting religious tolerance and incorporating Hindu elites into governance",
            "Rejecting all foreign trade and isolating the Mughal Empire",
            "Abolishing the caste system and establishing social equality"
        ],
        correct: 1,
        explanation: "Akbar (r. 1556–1605) pursued a policy of sulh-i-kul (universal peace), abolishing the jizya tax on non-Muslims, marrying Rajput Hindu princesses, and appointing Hindus to high government positions. These policies helped consolidate Mughal control over a diverse, predominantly Hindu population."
    },
    {
        period: "Unit 3",
        periodName: "Land-Based Empires (1450–1750)",
        topic: "Ming Dynasty",
        stimulus: `"In 1433, the great treasure fleets of Admiral Zheng He were recalled, the ships left to rot in their harbors. The Confucian bureaucracy had decided that such voyages were wasteful extravagance."`,
        stimulusSource: "— Historical account of Ming maritime policy",
        question: "The decision described in the passage best reflects which broader pattern in Ming dynasty governance?",
        options: [
            "A pragmatic shift toward overland trade with Central Asia via the Silk Roads",
            "A turn toward isolationism and the prioritization of internal stability over maritime expansion",
            "A military strategy to concentrate naval forces against Japanese pirates",
            "An economic calculation that maritime trade yielded insufficient revenue"
        ],
        correct: 1,
        explanation: "The Ming court's decision to end Zheng He's voyages reflected a broader inward turn, prioritizing agricultural self-sufficiency, Confucian values, and internal stability over costly maritime expeditions. This contrasted sharply with the contemporaneous European Age of Exploration."
    },
    {
        period: "Unit 3",
        periodName: "Land-Based Empires (1450–1750)",
        topic: "Safavid Empire",
        question: "The Safavid Empire's establishment of Twelver Shia Islam as the state religion had which significant consequence?",
        options: [
            "It unified all Muslim-majority regions under a single religious authority",
            "It created a distinct Persian-Shia identity and sharpened conflict with the Sunni Ottoman Empire",
            "It led to the immediate conversion of all subjects, eliminating religious diversity",
            "It reduced the power of the Safavid shah by subordinating him to religious clerics"
        ],
        correct: 1,
        explanation: "The Safavid imposition of Twelver Shia Islam as the state religion forged a distinct national identity for Persia and created an enduring sectarian rivalry with the Sunni Ottoman Empire. This Sunni-Shia divide became a defining feature of Middle Eastern geopolitics."
    },
    {
        period: "Unit 3",
        periodName: "Land-Based Empires (1450–1750)",
        topic: "Russian Empire",
        question: "Peter the Great's reforms in Russia were primarily aimed at:",
        options: [
            "Restoring traditional Slavic customs and rejecting Western influence",
            "Modernizing Russia's military, bureaucracy, and society along Western European models",
            "Establishing a constitutional monarchy with an elected parliament",
            "Expanding Russian trade networks into sub-Saharan Africa"
        ],
        correct: 1,
        explanation: "Peter the Great (r. 1682–1725) pursued aggressive Westernization, reforming the military along European lines, building a navy, establishing St. Petersburg as a 'window to the West,' reorganizing the government bureaucracy, and even mandating Western dress and grooming among the nobility."
    },

    // ═══ UNIT 4: Transoceanic Interconnections (c. 1450–1750) ═══
    {
        period: "Unit 4",
        periodName: "Transoceanic Interconnections (1450–1750)",
        topic: "Columbian Exchange",
        stimulus: `"Within a century of contact, the indigenous population of the Americas had declined by as much as 90 percent. Meanwhile, crops like maize and potatoes would eventually double the population of Europe."`,
        stimulusSource: "— Demographic study of the Columbian Exchange",
        question: "The developments described in the passage best illustrate which historical concept?",
        options: [
            "The inevitable superiority of European military technology",
            "The profound and uneven biological consequences of transoceanic contact",
            "The deliberate European policy of genocide against indigenous peoples",
            "The equal exchange of benefits between the Eastern and Western Hemispheres"
        ],
        correct: 1,
        explanation: "The Columbian Exchange had devastating biological consequences for indigenous Americans, who lacked immunity to Old World diseases like smallpox. Simultaneously, New World crops like potatoes and maize boosted food production and population growth in the Old World, illustrating the profoundly uneven impacts of this exchange."
    },
    {
        period: "Unit 4",
        periodName: "Transoceanic Interconnections (1450–1750)",
        topic: "Atlantic Slave Trade",
        question: "Which of the following best describes the primary economic motivation behind the Atlantic slave trade?",

// ── State ──
let activePeriods = new Set();
let filteredQuestions = [];
let currentIndex = 0;
let score = 0;
let streak = 0;
let answered = 0;
let shuffledCorrect = 0;

const periods = ["All", "Foundations", "Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5", "Unit 6", "Unit 7", "Unit 8", "Unit 9"];

// ── Initialize ──
function init() {
    const filterDiv = document.getElementById('periodFilter');
    periods.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'period-btn' + (p === 'All' ? ' active' : '');
        btn.textContent = p;
        btn.onclick = () => togglePeriod(p, btn);
        filterDiv.appendChild(btn);
    });
    activePeriods.add('All');
}

function togglePeriod(period, btn) {
    const allBtn = document.querySelector('.period-btn');
    if (period === 'All') {
        activePeriods.clear();
        activePeriods.add('All');
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
    } else {
        activePeriods.delete('All');
        allBtn.classList.remove('active');
        if (activePeriods.has(period)) {
            activePeriods.delete(period);
            btn.classList.remove('active');
        } else {
            activePeriods.add(period);
            btn.classList.add('active');
        }
        if (activePeriods.size === 0) {
            activePeriods.add('All');
            allBtn.classList.add('active');
        }
    }
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startQuiz() {
    if (activePeriods.has('All')) {
        filteredQuestions = [...questions];
    } else {
        filteredQuestions = questions.filter(q => activePeriods.has(q.period));
    }

    if (filteredQuestions.length === 0) {
        alert('No questions available for selected periods.');
        return;
    }

    shuffle(filteredQuestions);
    currentIndex = 0;
    score = 0;
    streak = 0;
    answered = 0;

    document.getElementById('home').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';

    updateStats();
    renderQuestion();
}

function renderQuestion() {
    const q = filteredQuestions[currentIndex];
    const card = document.getElementById('questionCard');
    const letters = ['A', 'B', 'C', 'D'];

    // Shuffle options: create index array, shuffle it, track where correct answer lands
    const indices = [0, 1, 2, 3];
    shuffle(indices);
    shuffledCorrect = indices.indexOf(q.correct);

    let html = `
        <div class="question-meta">
            <span class="badge badge-period">${q.period}</span>
            <span class="badge badge-topic">${q.topic}</span>
            <span class="badge badge-num">Q${currentIndex + 1} of ${filteredQuestions.length}</span>
        </div>
    `;

    if (q.stimulus) {
        html += `<div class="stimulus">${q.stimulus}`;
        if (q.stimulusSource) html += `<div class="stimulus-source">${q.stimulusSource}</div>`;
        html += `</div>`;
    }

    html += `<div class="question-text">${q.question}</div>`;
    html += `<div class="options">`;

    indices.forEach((origIdx, displayIdx) => {
        html += `
            <div class="option" onclick="selectAnswer(${displayIdx})" id="opt-${displayIdx}">
                <span class="option-letter">${letters[displayIdx]}</span>
                <span>${q.options[origIdx]}</span>
            </div>
        `;
    });

    html += `</div>`;
    card.innerHTML = html;

    document.getElementById('explanation').className = 'explanation';
    document.getElementById('explanation').innerHTML = '';
    document.getElementById('nextBtn').className = 'next-btn';

    const progressPct = (currentIndex / filteredQuestions.length) * 100;
    document.getElementById('progressFill').style.width = progressPct + '%';
}

function selectAnswer(idx) {
    const q = filteredQuestions[currentIndex];
    const options = document.querySelectorAll('.option');

    // Prevent double-click
    if (options[0].classList.contains('disabled')) return;

    options.forEach(o => o.classList.add('disabled'));

    answered++;

    if (idx === shuffledCorrect) {
        score++;
        streak++;
        options[idx].classList.add('correct');
    } else {
        streak = 0;
        options[idx].classList.add('incorrect');
        options[shuffledCorrect].classList.add('show-correct');
    }

    // Show explanation
    const expDiv = document.getElementById('explanation');
    expDiv.innerHTML = `<h4>${idx === shuffledCorrect ? 'Correct!' : 'Incorrect'}</h4><p>${q.explanation}</p>`;
    expDiv.className = 'explanation show';

    document.getElementById('nextBtn').className = 'next-btn show';
    updateStats();
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex >= filteredQuestions.length) {
        showResults();
        return;
    }
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateStats() {
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('totalVal').textContent = `${answered}/${filteredQuestions.length}`;
    document.getElementById('streakVal').textContent = streak;
    document.getElementById('pctVal').textContent = answered > 0 ? Math.round((score / answered) * 100) + '%' : '0%';
}

function showResults() {
    document.getElementById('quiz').style.display = 'none';
    const pct = Math.round((score / answered) * 100);
    let grade = '';
    if (pct >= 90) grade = 'Excellent!';
    else if (pct >= 80) grade = 'Great Job!';
    else if (pct >= 70) grade = 'Good Work!';
    else if (pct >= 60) grade = 'Keep Practicing!';
    else grade = 'Study More!';

    const res = document.getElementById('results');
    res.style.display = 'block';
    res.innerHTML = `
        <h2>${grade}</h2>
        <div class="score-circle">
            <span class="pct">${pct}%</span>
            <span class="label">Score</span>
        </div>
        <div class="results-detail">
            <div class="stat">
                <div class="stat-value" style="color:#22c55e">${score}</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat">
                <div class="stat-value" style="color:#ef4444">${answered - score}</div>
                <div class="stat-label">Incorrect</div>
            </div>
            <div class="stat">
                <div class="stat-value" style="color:#60a5fa">${answered}</div>
                <div class="stat-label">Total</div>
            </div>
        </div>
        <button class="restart-btn" onclick="restart()">Try Again</button>
    `;
}

function quitQuiz() {
    if (answered > 0) {
        showResults();
    } else {
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('home').style.display = 'block';
    }
}

function restart() {
    document.getElementById('results').style.display = 'none';
    document.getElementById('home').style.display = 'block';
}

init();
</script>
</body>
</html>
